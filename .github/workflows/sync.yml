name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # Crucial if your repo contains large weights or datasets

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git credentials using the HF token
          git remote add hf https://x-token-auth:$HF_TOKEN@huggingface.co/benjaminyzg/my-awesome-model
          
          # Force push to overwrite the target HF repo branch with your Xclean GitHub history
          git push --force hf main
    
